<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niva Jewels - Exquisite Jewelry</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-gem text-yellow-600 text-2xl"></i>
                <span class="text-2xl font-bold text-gray-800">Niva <span class="text-yellow-600">Jewels</span></span>
            </div>
            <div class="hidden md:flex space-x-6">
                <a href="#" onclick="showPage('home')" class="nav-link text-gray-700 hover:text-yellow-600">Home</a>
                <a href="#" onclick="showPage('products')" class="nav-link text-gray-700 hover:text-yellow-600">Shop</a>
                <a href="#" onclick="showPage('cart')" class="nav-link text-gray-700 hover:text-yellow-600 relative">
                    Cart <span id="cartCount" class="bg-yellow-600 text-white text-xs rounded-full px-1.5 py-0.5 ml-1">0</span>
                </a>
                <a href="#" id="authLink" onclick="showPage('login')" class="nav-link text-gray-700 hover:text-yellow-600">Login</a>
                <a href="#" id="adminLink" style="display:none;" onclick="showPage('admin')" class="nav-link text-red-600 hover:text-red-800">Admin</a>
                <a href="#" id="logoutBtn" style="display:none;" onclick="logout()" class="nav-link text-gray-700 hover:text-yellow-600">Logout</a>
            </div>
            <div class="md:hidden">
                <button id="mobileMenuBtn" class="text-gray-700"><i class="fas fa-bars text-xl"></i></button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="app" class="container mx-auto px-4 py-8 min-h-screen">
        <!-- Dynamic content will be loaded here -->
    </main>

    <!-- WhatsApp Floating Button -->
    <a href="https://wa.me/919706011300" target="_blank" class="fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-lg hover:bg-green-600 transition z-50">
        <i class="fab fa-whatsapp text-2xl"></i>
    </a>

    <script src="script.js"></script>
</body>
</html>
